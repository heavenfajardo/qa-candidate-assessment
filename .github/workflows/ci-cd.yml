name: CI/CD Pipeline

on:
  push:
    branches:
      - main  

jobs:
  cypress:
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '24.11.1'

    - name: Install dependencies
      working-directory: ./qa-candidate-assessment  # update if your Node.js project is in a subfolder
      run: |
        npm install
        npm install cypress

    - name: Run Cypress tests
      working-directory: ./qa-candidate-assessment
      run: npx cypress run

  postman-api:
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Postman CLI
      run: |
        curl -L https://dl.pstmn.io/download/latest/linux64 -o postman-cli.tar.gz
        tar -xvzf postman-cli.tar.gz
        sudo mv Postman /usr/local/bin/pm
        sudo chmod +x /usr/local/bin/pm

    - name: Verify Postman CLI installation
      run: pm version

    - name: Run Postman collection
      run: pm run api-tests/your_postman_collection.json

  k6-performance:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install k6
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install -y k6
        k6 version

    - name: Run k6 performance test
      run: k6 run performance-tests/create_order_test.js