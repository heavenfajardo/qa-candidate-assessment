name: CI/CD Pipeline

on:
  push:
    branches:
      - main  

jobs:
  full-test-pipeline:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.11.1'

      - name: Cache Node modules and Cypress binary
        uses: actions/cache@v3
        with:
          path: |
            ./ui-tests/node_modules
            C:/Users/runneradmin/AppData/Local/Cypress/Cache
          key: cypress-${{ runner.os }}-${{ hashFiles('**/ui-tests/package-lock.json') }}

      - name: Install Cypress dependencies
        working-directory: ./ui-tests
        run: |
          npm install
          npm install cypress

      - name: Install Cypress binary
        working-directory: ./ui-tests
        run: npx cypress install

      - name: Run Cypress tests
        working-directory: ./ui-tests
        run: npx cypress run

      - name: Install Newman (Postman CLI)
        run: npm install -g newman

      - name: Start local API server
        shell: powershell
        run: |
          $server = Start-Process node -ArgumentList "./api-tests/server.js" -PassThru
          # Wait until port 3000 is open
          $timeout = 60
          $elapsed = 0
          while ($true) {
            try {
              $tcp = New-Object System.Net.Sockets.TcpClient
              $tcp.Connect('127.0.0.1', 3000)
              $tcp.Close()
              break
            } catch {
              Start-Sleep -Seconds 1
              $elapsed++
              if ($elapsed -ge $timeout) {
                Write-Host "Server did not start within $timeout seconds."
                Exit 1
              }
            }
          }

      - name: Run Postman collection
        shell: powershell
        run: newman run ./api-tests/postman-collections.json

      - name: Install k6
        shell: powershell
        run: |
          choco install k6 -y
          k6 version

      - name: Run k6 performance test
        shell: powershell
        run: k6 run ./performance-tests/create_order_test.js