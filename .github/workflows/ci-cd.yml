name: CI/CD Pipeline

on:
  push:
    branches:
      - main  

jobs:
  full-test-pipeline:
    runs-on: windows-latest

    steps:
      # -------------------- Checkout repo --------------------
      - name: Checkout code
        uses: actions/checkout@v2

      # -------------------- Setup Node.js --------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.11.1'

      # -------------------- Cypress UI Tests --------------------
      - name: Install Cypress dependencies
        working-directory: ./ui-tests
        run: |
          npm install
          npm install cypress

      - name: Run Cypress tests
        working-directory: ./ui-tests
        run: npx cypress run

      # -------------------- Postman API Tests --------------------
      - name: Install Newman (Postman CLI)
        run: npm install -g newman

      - name: Start local API server
        run: |
          node ./server.js
        shell: powershell
        background: true  # Keep server running in background

      - name: Wait for server to start
        run: Start-Sleep -Seconds 5
        shell: powershell

      - name: Run Postman collection
        run: newman run ./api-tests/postman-collections.json

      # -------------------- k6 Performance Tests --------------------
      - name: Install k6
        shell: powershell
        run: |
          choco install k6 -y
          k6 version

      - name: Run k6 performance test
        run: k6 run ./performance-tests/create_order_test.js
        shell: powershell